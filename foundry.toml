[profile.default]
src = "contracts"
test = "test"
out = "out"
libs = ["lib"]
solc_version = "0.7.6"
optimizer = true
optimizer_runs = 200

fs_permissions = [{ access = "read-write", path = "./"}]

no_match_test = "testEchidna"

# See more config options https://github.com/foundry-rs/foundry/tree/master/config

[fuzz]
runs = 5000

[rpc_endpoints]
base = "${BASE_RPC_URL}"
celo = "${CELO_RPC_URL}"
fraxtal = "${FRAXTAL_RPC_URL}"
ink = "${INK_RPC_URL}"
lisk = "${LISK_RPC_URL}"
metal = "${METAL_RPC_URL}"
mode = "${MODE_RPC_URL}"
optimism = "${OPTIMISM_RPC_URL}"
soneium = "${SONEIUM_RPC_URL}"
superseed = "${SUPERSEED_RPC_URL}"
swell = "${SWELL_RPC_URL}"
unichain = "${UNICHAIN_RPC_URL}"

[etherscan]
base = { key = "${ETHERSCAN_API_KEY}" }
celo = { key = "${ETHERSCAN_API_KEY}" }
fraxtal = { key = "${ETHERSCAN_API_KEY}" }
optimism = { key = "${ETHERSCAN_API_KEY}" }